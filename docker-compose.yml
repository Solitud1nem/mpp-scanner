services:
  api:
    build: .
    env_file: .env
    ports: ["8000:8000"]
    depends_on: [redis, postgres]
    command: uv run uvicorn mpp_scanner.service.app:app --host 0.0.0.0 --port 8000
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql://scanner:${DB_PASSWORD:-devpassword}@postgres:5432/mpp_scanner

  worker:
    build: .
    env_file: .env
    command: uv run rq worker scan-jobs
    depends_on: [redis]
    environment:
      REDIS_URL: redis://redis:6379/0
    deploy:
      replicas: 3

  target-vuln:
    build: .
    ports: ["9000:9000"]
    command: uv run uvicorn tests.fixtures.vuln_mpp_server:app --host 0.0.0.0 --port 9000

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mpp_scanner
      POSTGRES_USER: scanner
      POSTGRES_PASSWORD: ${DB_PASSWORD:-devpassword}
    volumes: [pgdata:/var/lib/postgresql/data]
    ports: ["5432:5432"]

volumes:
  pgdata:
